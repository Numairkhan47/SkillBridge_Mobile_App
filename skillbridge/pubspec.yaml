name: skillbridge
description: "SkillBridge - A Local Skill Exchange & Freelance Mobile Application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.1

  # Local persistence (acts as the offline "backend" data layer)
  shared_preferences: ^2.2.2

  # Networking (ready for REST API / Firebase REST integration)
  http: ^1.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
